name: Python Application

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Check code syntax
      run: |
        python -m py_compile main.py
        python -m py_compile config.py
        python -m py_compile video_cache.py
        python -m py_compile src/config.py
        python -m py_compile src/core/__init__.py
        python -m py_compile src/core/state.py
        python -m py_compile src/core/video_processor.py
        python -m py_compile src/core/comparator.py
        python -m py_compile src/core/scanner.py
        python -m py_compile src/ui/__init__.py
        python -m py_compile src/ui/translations.py
        python -m py_compile src/ui/main_window.py
        python -m py_compile src/ui/settings_window.py
        python -m py_compile src/ui/language_manager.py
        python -m py_compile src/utils/__init__.py
        python -m py_compile src/utils/progress.py
    